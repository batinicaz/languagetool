name: Build
on:
  push:
    branches: ["**", "!main"]
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  build:
    uses: batinicaz/gha/.github/workflows/docker.yml@dbabbc3d5f938c9778cf59c73438717c35ab5988 # ratchet:batinicaz/gha/.github/workflows/docker.yml@v1.8.1
    with:
      runner: ubuntu-24.04-arm
      push: false
      no_cache_filter: runtime
      smoke_test: |
        docker run -d -p 8010:8010 --name lt-smoke "$IMAGE"
        ./smoke-test.sh
        docker stop lt-smoke > /dev/null
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
