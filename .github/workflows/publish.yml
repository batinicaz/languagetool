name: Build & Publish
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  publish:
    uses: batinicaz/gha/.github/workflows/docker.yml@d0e2e58304385e918dc140830023b530b54d79aa # ratchet:batinicaz/gha/.github/workflows/docker.yml@v1.8.1
    with:
      runner: ubuntu-24.04-arm
      no_cache_filter: runtime
      smoke_test: |
        docker run -d -p 8010:8010 --name lt-smoke "$IMAGE"
        ./smoke-test.sh
        docker stop lt-smoke > /dev/null
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
