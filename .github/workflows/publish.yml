name: Build & Publish
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  packages: write
  security-events: write
jobs:
  publish:
    uses: batinicaz/gha/.github/workflows/docker.yml@be177ee58385970a49f5c7032bc9532eb8b2c2ae # ratchet:batinicaz/gha/.github/workflows/docker.yml@v1.7.2
    with:
      runner: ubuntu-24.04-arm
      smoke_test: |
        docker run -d -p 8010:8010 --name lt-smoke "$IMAGE"
        ./smoke-test.sh
        docker stop lt-smoke > /dev/null
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
